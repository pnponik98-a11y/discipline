<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#1b1d21">
    <title>discipline</title>
    <link rel="manifest" href="manifest.json">
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js').catch(err => console.error(err));
            });
        }
    </script>
    <style>
        :root {
            --bg: #1b1d21; --text: #e0e0e0; --shadow-light: #25282e; --shadow-dark: #111316;
            --accent: #4b7bec; --success: #1eb96a; --warning: #f7b731; --danger: #eb3b5a;
        }
        * { box-sizing: border-box; transition: all 0.3s; }
        body { 
            font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); 
            margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; 
        }
        .container { width: 100%; max-width: 450px; }
        h1 { text-align: center; font-weight: 800; color: var(--accent); text-transform: lowercase; margin-bottom: 20px; }
        
        .streak-badge {
            background: rgba(247, 183, 49, 0.1); color: var(--warning); padding: 4px 10px;
            border-radius: 10px; font-size: 0.75rem; font-weight: bold;
        }
        .redemption-badge {
            background: var(--danger); color: white; padding: 4px 8px; border-radius: 8px;
            font-size: 0.7rem; font-weight: 800; animation: pulse 2s infinite;
        }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.6; } 100% { opacity: 1; } }

        .shame-msg {
            color: var(--danger); font-size: 0.85rem; font-style: italic; text-align: center;
            margin-top: 15px; padding: 10px; background: rgba(235, 59, 90, 0.08); border-radius: 12px;
            border-left: 3px solid var(--danger);
        }

        .card { 
            background: var(--bg); border-radius: 28px; padding: 22px; margin-bottom: 25px;
            box-shadow: 10px 10px 20px var(--shadow-dark), -6px -6px 15px var(--shadow-light);
            border: 1px solid rgba(255,255,255,0.03); position: relative;
        }
        .target-reached { border: 1px solid var(--success); }
        .count-display { font-size: 3.5rem; font-weight: 900; text-align: center; margin: 15px 0; }
        .btn-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 12px; }
        button {
            border: none; border-radius: 18px; padding: 16px; font-weight: 700; cursor: pointer;
            background: var(--bg); color: var(--text);
            box-shadow: 6px 6px 12px var(--shadow-dark), -4px -4px 10px var(--shadow-light);
        }
        button:active { box-shadow: inset 4px 4px 8px var(--shadow-dark); transform: scale(0.97); }
        .btn-main { background: var(--accent); color: white; }
        
        .settings-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 20px;
            font-size: 0.8rem; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 15px;
        }
        input { background: #111316; border: none; border-radius: 8px; color: white; padding: 8px; width: 100%; }
        
        .diary-card { background: var(--bg); border-radius: 20px; padding: 15px; box-shadow: inset 6px 6px 12px var(--shadow-dark); }
        .backup-controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        
        /* Кнопка теста */
        .test-btn {
            background: #2d1b1b; color: #eb3b5a; border: 1px solid #eb3b5a;
            margin-bottom: 20px; font-size: 0.7rem; padding: 10px; width: 100%;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>discipline</h1>
    
    <button class="test-btn" onclick="testShame()">⚠️ ТЕСТ ШЕЙМИНГА (ВРЕМЕННО)</button>

    <button onclick="addCounter()" style="width: 100%; margin-bottom: 25px; opacity: 0.5; background: none; border: 1px dashed #444;">+ НОВАЯ ПЛИТА</button>
    
    <div id="counters-list"></div>

    <div style="margin-top: 40px;">
        <h3>📓 ЖУРНАЛ</h3>
        <div class="diary-card" id="diary-logs"></div>
        <div class="backup-controls">
            <button onclick="exportData()" style="font-size: 0.7rem;">💾 БЭКАП</button>
            <button onclick="document.getElementById('importFile').click()" style="font-size: 0.7rem;">📂 ЗАГРУЗИТЬ</button>
            <input type="file" id="importFile" style="display:none" onchange="importData(event)">
        </div>
    </div>
</div>

<script>
    const shamePhrases = [
        "ты меня подвел...",
        "я верил в тебя, а ты сдался.",
        "слабость берет верх?",
        "еще один день впустую.",
        "дисциплина — это не про тебя.",
        "твои оправдания ничего не стоят."
    ];

    let appState = JSON.parse(localStorage.getItem('proCounter_vUltimate')) || { counters: [], diary: [] };

    function save() {
        localStorage.setItem('proCounter_vUltimate', JSON.stringify(appState));
        render();
    }

    // ФУНКЦИЯ ТЕСТА
    function testShame() {
        if (appState.counters.length === 0) {
            alert("Сначала создай хотя бы одну плиту!");
            return;
        }
        const c = appState.counters[0];
        c.shameMsg = shamePhrases[Math.floor(Math.random() * shamePhrases.length)];
        c.inRedemption = true;
        c.streak = 0;
        save();
    }

    function addCounter() {
        appState.counters.push({
            id: Date.now(), name: "Цель", value: 0, target: 10,
            resetTime: "00:00", lastResetTS: Date.now(),
            streak: 0, shameMsg: "", inRedemption: false,
            isTimer: false, timerRunning: false, history: []
        });
        save();
    }

    function checkResets() {
        const now = new Date();
        let changed = false;
        appState.counters.forEach(c => {
            const [h, m] = c.resetTime.split(':');
            const resetPoint = new Date();
            resetPoint.setHours(parseInt(h), parseInt(m), 0, 0);

            if (now >= resetPoint && c.lastResetTS < resetPoint.getTime()) {
                const effectiveTarget = c.inRedemption ? (c.target * 2) : c.target;
                const success = c.value >= effectiveTarget;

                if (success) {
                    c.streak++;
                    c.shameMsg = "";
                    c.inRedemption = false;
                } else {
                    c.shameMsg = shamePhrases[Math.floor(Math.random() * shamePhrases.length)];
                    c.inRedemption = true;
                    c.streak = 0;
                }

                appState.diary.push({ 
                    date: new Date(c.lastResetTS).toLocaleDateString(), 
                    name: c.name, val: c.value, status: success ? '✅' : '❌' 
                });

                c.value = 0;
                c.lastResetTS = Date.now();
                changed = true;
            }
        });
        if (changed) save();
    }

    function render() {
        const list = document.getElementById('counters-list');
        list.innerHTML = '';
        appState.counters.forEach(c => {
            const effectiveTarget = c.inRedemption ? (c.target * 2) : c.target;
            const isReached = c.value >= effectiveTarget;

            const card = document.createElement('div');
            card.className = `card ${isReached ? 'target-reached' : ''}`;
            card.innerHTML = `
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <input type="text" value="${c.name}" onchange="updateCounter(${c.id}, 'name', this.value)" style="background:none; border:none; color:white; font-weight:bold; width:50%; outline:none;">
                    <div style="display:flex; gap:8px;">
                        ${c.streak > 0 ? `<span class="streak-badge">🔥 ${c.streak}</span>` : ''}
                        ${c.inRedemption ? `<span class="redemption-badge">X2</span>` : ''}
                    </div>
                </div>

                <div class="count-display">${c.value}</div>
                
                <div class="btn-grid">
                    <button class="btn-main" onclick="changeVal(${c.id}, 1)">+1</button>
                    <button onclick="updateCounter(${c.id}, 'value', 0)">СБРОС</button>
                </div>

                ${c.shameMsg ? `<div class="shame-msg">${c.shameMsg}</div>` : ''}

                <div class="settings-grid">
                    <div>Цель: <input type="number" value="${c.target}" onchange="updateCounter(${c.id}, 'target', parseInt(this.value))"></div>
                    <div>Сброс: <input type="time" value="${c.resetTime}" onchange="updateCounter(${c.id}, 'resetTime', this.value)"></div>
                </div>
                <button onclick="deleteCounter(${c.id})" style="margin-top:15px; padding:5px; font-size:0.6rem; background:none; box-shadow:none; color:#555; width:100%;">УДАЛИТЬ ПЛИТУ</button>
            `;
            list.appendChild(card);
        });
        updateDiaryDisplay();
    }

    function changeVal(id, delta) { const c = appState.counters.find(x => x.id === id); if (c) { c.value += delta; save(); } }
    function updateCounter(id, f, v) { const c = appState.counters.find(x => x.id === id); if (c) { c[f] = v; save(); } }
    function deleteCounter(id) { if(confirm("Удалить?")) { appState.counters = appState.counters.filter(c => c.id !== id); save(); } }
    
    function updateDiaryDisplay() {
        const div = document.getElementById('diary-logs');
        div.innerHTML = appState.diary.slice(-10).reverse().map(l => `
            <div style="font-size:0.8rem; padding:8px; border-bottom:1px solid #222; display:flex; justify-content:space-between;">
                <span>${l.date} ${l.name}</span> <b>${l.val} ${l.status || ''}</b>
            </div>
        `).join('') || '<p style="text-align:center; color:#444">История пуста</p>';
    }

    function exportData() {
        const blob = new Blob([JSON.stringify(appState)], {type: 'application/json'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `discipline_backup.json`;
        a.click();
    }
    function importData(e) {
        const reader = new FileReader();
        reader.onload = (event) => { appState = JSON.parse(event.target.result); save(); };
        reader.readAsText(e.target.files[0]);
    }

    setInterval(checkResets, 30000);
    checkResets();
    render();
</script>
</body>
</html>
